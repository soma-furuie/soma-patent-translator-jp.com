<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="msvalidate.01" content="5E2A38D22C4D6353D3E4AC04A96D09AD" />
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
<meta name="author" content="{{ site.Params.author }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ site.Title }}">
<meta property="og:locale" content="en_US">
<meta property="og:image" content="{{ "images/portrait.jpg" | absURL }}">
<meta property="og:image:alt" content="Soma Furuie, freelance EN→JA patent translator, Kyoto, Japan">
<meta property="og:image:width" content="1280">
<meta property="og:image:height" content="914">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
<meta name="twitter:image" content="{{ "images/portrait.jpg" | absURL }}">
<meta name="twitter:image:alt" content="Soma Furuie, freelance EN→JA patent translator, Kyoto, Japan">

<!-- Google Fonts: Cormorant Garamond (headings) + Inter Tight (body/UI) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Main CSS -->
{{ $css := resources.Get "css/main.css" }}
<link rel="stylesheet" href="{{ $css.Permalink }}">

<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}">

<!-- Favicon -->
<link rel="icon" href="{{ "favicon.ico" | absURL }}">

<!-- Structured Data (Schema.org / JSON-LD) -->
{{ partial "jsonld.html" . }}

<!-- Cloudflare Web Analytics -->
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "2b115c34ccd24e8494d3702b31f77b69"}'></script>
<!-- End Cloudflare Web Analytics -->
