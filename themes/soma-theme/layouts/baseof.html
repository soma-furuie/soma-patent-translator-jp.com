<!DOCTYPE html>
<html lang="{{ or site.Language.Locale `en` }}" dir="{{ or site.Language.Direction `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <header>
    {{ partial "header.html" . }}
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    {{ partial "footer.html" . }}
  </footer>
  {{ $js := resources.Get "js/main.js" }}
  <script src="{{ $js.Permalink }}"></script>
</body>
</html>
